name: Build Odia Piper TTS APK

on:
  push:
    branches: [ main ]
    paths:
      - 'build.py'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('build.py') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: python build.py

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: odia-tts-apk
          path: output/*.apk
          if-no-files-found: error
          retention-days: 14
