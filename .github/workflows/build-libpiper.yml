name: Build libpiper.so for Android

on:
  workflow_dispatch:
    inputs:
      abi:
        description: 'Android ABI to build for'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout piper1-gpl
        uses: actions/checkout@v4
        with:
          repository: OHF-Voice/piper1-gpl
          path: piper1-gpl

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential

      - name: Build native espeak-ng (host binary, needed by data-file generation step)
        shell: bash
        run: |
          set -o pipefail
          # The Android cross-compile produces an ARM64 espeak-ng binary that
          # cannot run on this x86_64 runner. But espeak-ng's own build calls
          # that binary BY ABSOLUTE PATH (not via PATH lookup) to generate data
          # files like espeak-ng-data/intonations. So a PATH-based override
          # won't intercept it -- we instead build a native binary here, then
          # after the cross-compile produces its (unexecutable) ARM64 copy at
          # the same relative location, we swap our native one in before the
          # data-generation step runs. See the "Swap in native espeak-ng binary"
          # step further down for where this is actually used.
          git clone --depth 1 https://github.com/espeak-ng/espeak-ng.git /tmp/espeak-ng-native
          cd /tmp/espeak-ng-native
          cmake -Bbuild -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DUSE_ASYNC=OFF -DUSE_MBROLA=OFF -DUSE_LIBSONIC=OFF \
            -DUSE_LIBPCAUDIO=OFF -DUSE_KLATT=OFF -DUSE_SPEECHPLAYER=OFF
          cmake --build build
          mkdir -p /tmp/native-bin
          find build -maxdepth 2 -type f -name "espeak-ng" -exec cp {} /tmp/native-bin/espeak-ng \;
          chmod +x /tmp/native-bin/espeak-ng
          /tmp/native-bin/espeak-ng --version

      - name: Resolve Android toolchain binaries and export as env vars
        id: ndk-env
        run: |
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ABI="${{ github.event.inputs.abi }}"

          if [ "$ABI" = "arm64-v8a" ]; then
            TRIPLE="aarch64-linux-android"
          else
            TRIPLE="armv7a-linux-androideabi"
          fi
          API=24

          echo "TOOLCHAIN_BIN=$TOOLCHAIN" >> "$GITHUB_ENV"
          echo "CC=$TOOLCHAIN/${TRIPLE}${API}-clang" >> "$GITHUB_ENV"
          echo "CXX=$TOOLCHAIN/${TRIPLE}${API}-clang++" >> "$GITHUB_ENV"
          echo "AR=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB=$TOOLCHAIN/llvm-ranlib" >> "$GITHUB_ENV"
          echo "STRIP=$TOOLCHAIN/llvm-strip" >> "$GITHUB_ENV"
          echo "NDK_TRIPLE=$TRIPLE" >> "$GITHUB_ENV"
          echo "NDK_API=$API" >> "$GITHUB_ENV"

          echo "Resolved compiler: $TOOLCHAIN/${TRIPLE}${API}-clang"
          ls -la "$TOOLCHAIN/${TRIPLE}${API}-clang" || echo "WARNING: compiler binary not found at expected path, build will fail"

      - name: Configure CMake for Android
        working-directory: piper1-gpl/libpiper
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
        shell: bash
        run: |
          set -o pipefail
          # CC/CXX/AR/RANLIB are now set as job-level env vars (from GITHUB_ENV above).
          # CMake checks these before auto-detecting a compiler, and any subprocess
          # cmake invoked by ExternalProject_Add (for espeak-ng) inherits this same
          # environment, so it cross-compiles instead of silently using host glibc.
          cmake -Bbuild -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_PATH/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ github.event.inputs.abi }} \
            -DANDROID_PLATFORM=android-$NDK_API \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            2>&1 | tee /tmp/configure.log

      - name: Build libpiper.so (first pass, expected to stop at espeak-ng data generation)
        working-directory: piper1-gpl/libpiper
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --config Release --verbose 2>&1 | tee /tmp/build-pass1.log || true

      - name: Swap in native espeak-ng binary so data-file generation can run
        working-directory: piper1-gpl/libpiper
        run: |
          TARGET=$(find build -path "*espeak_ng_external-build/src/espeak-ng" -type f | head -n1)
          if [ -z "$TARGET" ]; then
            echo "ERROR: could not find the cross-compiled espeak-ng binary path. Build may have failed earlier than expected."
            echo "Showing last 60 lines of pass 1 build log:"
            tail -n 60 /tmp/build-pass1.log
            exit 1
          fi
          echo "Found cross-compiled (unexecutable) binary at: $TARGET"
          file "$TARGET" || true
          cp /tmp/native-bin/espeak-ng "$TARGET"
          chmod +x "$TARGET"
          echo "Replaced with native host binary:"
          file "$TARGET" || true

      - name: Build libpiper.so (second pass, resumes past data generation)
        working-directory: piper1-gpl/libpiper
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --config Release --verbose 2>&1 | tee /tmp/build.log

      - name: Check espeak-ng static lib architecture (diagnostic)
        if: always()
        working-directory: piper1-gpl/libpiper
        run: |
          ESPEAK_OBJ=$(find build -name "*.c.o" -path "*espeak*" | head -n1)
          if [ -n "$ESPEAK_OBJ" ]; then
            echo "Sample espeak-ng object file: $ESPEAK_OBJ"
            file "$ESPEAK_OBJ" || true
          else
            echo "No espeak-ng object files found yet (build may have failed earlier)"
          fi

      - name: Install build output
        working-directory: piper1-gpl/libpiper
        run: |
          if [ ! -f build/libpiper.so ]; then
            echo "ERROR: build/libpiper.so was not produced. The build step failed silently before this point."
            echo "Listing build directory contents for diagnosis:"
            find build -maxdepth 2 -type f -name "*.so" -o -name "*.log" 2>/dev/null || true
            exit 1
          fi
          cmake --install build

      - name: Locate and stage .so output
        run: |
          mkdir -p output
          find ${{ github.workspace }}/install -name "*.so" -exec cp {} output/ \;
          find piper1-gpl/libpiper/build -name "*.so" -exec cp {} output/ \; || true
          ls -la output/

      - name: Upload build logs (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.event.inputs.abi }}
          path: |
            /tmp/configure.log
            /tmp/build-pass1.log
            /tmp/build.log
          if-no-files-found: warn

      - name: Upload libpiper.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpiper-${{ github.event.inputs.abi }}
          path: output/*.so
          if-no-files-found: error
