name: Build libpiper.so for Android

on:
  workflow_dispatch:
    inputs:
      abi:
        description: 'Android ABI to build for'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout piper1-gpl
        uses: actions/checkout@v4
        with:
          repository: OHF-Voice/piper1-gpl
          path: piper1-gpl

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential

      - name: Configure CMake for Android
        working-directory: piper1-gpl/libpiper
        run: |
          cmake -Bbuild -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ github.event.inputs.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build libpiper.so
        working-directory: piper1-gpl/libpiper
        run: cmake --build build --config Release

      - name: Install build output
        working-directory: piper1-gpl/libpiper
        run: cmake --install build

      - name: Locate and stage .so output
        run: |
          mkdir -p output
          find ${{ github.workspace }}/install -name "*.so" -exec cp {} output/ \;
          find piper1-gpl/libpiper/build -name "*.so" -exec cp {} output/ \; || true
          ls -la output/

      - name: Upload libpiper.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpiper-${{ github.event.inputs.abi }}
          path: output/*.so
          if-no-files-found: error
